<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tasks</title>
  </head>
  <body>
    <h1>Tasks</h1>
    {% if tasks %}
      <ul>
        {% for task in tasks %}
          <li>
            <strong>{{ task.title }}</strong> (week {{ task.week }})
            {% if task.completed %}
              ✅
            {% else %}
              ❌
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    {% else %}
      <p>No tasks found.</p>
    {% endif %}
  </body>
</html>
